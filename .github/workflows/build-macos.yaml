name: Build BlurMe macOS Executable

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install python@3.11
        pip3 install --upgrade pip

    - name: Create Executable with PyInstaller
      uses: sayyid5416/pyinstaller@v1
      with:
        python_ver: '3.11'
        spec: 'blurme_macos.py'
        requirements: 'requirements.txt'
        upload_exe_with_name: 'BlurMe-macOS'
        options: --onefile, --noconsole, --icon "blurme.ico", --name "BlurMe"

    - name: Make executable runnable
      run: chmod +x dist/BlurMe

    - name: Upload to Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/BlurMe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
