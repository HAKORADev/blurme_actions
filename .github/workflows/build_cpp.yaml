name: Build BlurMe C++ Executables

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-cpp:
    name: Build C++ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: BlurMe-Linux-cpp
            executable_name: BlurMe
            source_file: blurme_linux.cpp
          - os: windows-latest
            artifact_name: BlurMe-Windows-cpp
            executable_name: BlurMe.exe
            source_file: blurme_windows.cpp

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxext-dev libomp-dev

    - name: Build C++ (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        g++ -O3 -std=c++17 -pthread -fopenmp -o BlurMe blurme_linux.cpp -lX11 -lXext
        strip BlurMe

    - name: Build C++ (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        g++ -O3 -std=c++17 -pthread -fopenmp -o BlurMe.exe blurme_windows.cpp -lgdi32 -luser32
        strip BlurMe.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.executable_name }}

    - name: Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.executable_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
