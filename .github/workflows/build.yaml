name: Build BlurMe Executables

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: BlurMe-Linux
            executable_name: BlurMe
            source_file: blurme_linux.py
          - os: windows-latest
            artifact_name: BlurMe-Windows
            executable_name: BlurMe.exe
            source_file: blurme_windows.py
          - os: macos-latest
            artifact_name: BlurMe-macOS
            executable_name: BlurMe
            source_file: blurme_macos.py

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1 \
          libglib2.0-0 \
          libsm6 \
          libxext6 \
          libxrender1 \
          libgomp1 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          libxkbcommon-x11-0 \
          libdbus-1-3 \
          libegl1 \
          libxcb-cursor0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile \
          --noconsole \
          --name "BlurMe" \
          --icon "blurme.ico" \
          --hidden-import PyQt5 \
          --hidden-import PyQt5.sip \
          --hidden-import PyQt5.QtCore \
          --hidden-import PyQt5.QtGui \
          --hidden-import PyQt5.QtWidgets \
          --collect-all PyQt5 \
          --add-data "blurme.ico:." \
          "${{ matrix.source_file }}"

    - name: Post-build (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: chmod +x dist/BlurMe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.executable_name }}

    - name: Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.executable_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
